# Refuge du Suffet topo generator — user-editable config.
#
# Edit this file to change the refuge location, brand palette, tile zoom range,
# or the label strings used in the PDF chrome. Everything else (line drawing,
# GPS reading, template layout) is fixed in code.

refuge:
  name: Refuge du Suffet
  lat: 45.206031
  lon: 6.845828
  alt: 1690

# Brand palette — colours re-used across PDF, HTML, and (keep in sync!) the
# annotator preview at tools/boulder-line-annotator.html.
brand:
  blue:   "#004AAD"   # primary
  teal:   "#6AB0AB"   # refuge marker / secondary
  lav:    "#A096EF"   # projects
  orange: "#E4572E"   # high-contrast line
  amber:  "#E0A21B"

# Problem-line colours (cycled by problem number). Projects always use the
# lavender + dashed style, so `lav` is intentionally in the list too.
line_palette:
  - "#004AAD"
  - "#E4572E"
  - "#6AB0AB"
  - "#A096EF"
  - "#E0A21B"

tiles:
  # Bundled zoom range for the offline map. Larger range = more tiles bundled
  # (bigger HTML, longer build). 16–18 is fine for a small area.
  zoom_min: 16
  zoom_max: 18

gps:
  # If a photo's GPSHPositioningError is ≥ this many metres, the PDF shows a
  # "low confidence, verify on map" warning.
  accuracy_flag_m: 15

# PDF chrome labels. Content (boulder names, problem names, GPS numbers, grades)
# is language-neutral and stays as-is.
#
# `Project` (the grade string) is mapped to `Projet` in FR at render time via
# `project_grade`. Font grades (6B, 7A+, etc.) are never translated.
labels:
  en:
    title:                  "Refuge du Suffet boulders"
    subtitle_getting_there: "Haute-Maurienne · getting there"
    regional_map_caption:   "IGN topo · where the refuge is"
    map_caption:            "IGN aerial · the refuge and the boulders"
    getting_there_heading:  "Getting there"
    subtitle_boulders:      "Haute-Maurienne · the boulders"
    boulders_heading:       "The boulders"
    footer:                 "Refuge du Suffet boulders · built from photo GPS + spreadsheet"
    location:               "Location"
    latitude:               "Latitude"
    longitude:              "Longitude"
    altitude:               "Altitude"
    photo_bearing:          "Photo bearing"
    problems:               "Problems"
    gps_warn:               "⚠  GPS ±%d m — low confidence, verify on map"
    gps_ok:                 "GPS ±%d m"
    project_grade:          "Project"
    legend:                 "Dashed line + open marker = project (unclimbed)."
  fr:
    title:                  "Blocs du Refuge du Suffet"
    subtitle_getting_there: "Haute-Maurienne · accès"
    regional_map_caption:   "IGN carte · situation du refuge"
    map_caption:            "IGN aérien · le refuge et les blocs"
    getting_there_heading:  "Accès"
    subtitle_boulders:      "Haute-Maurienne · les blocs"
    boulders_heading:       "Les blocs"
    footer:                 "Blocs du Refuge du Suffet · généré depuis GPS + tableur"
    location:               "Localisation"
    latitude:               "Latitude"
    longitude:              "Longitude"
    altitude:               "Altitude"
    photo_bearing:          "Orientation photo"
    problems:               "Voies"
    gps_warn:               "⚠  GPS ±%d m — faible précision, à vérifier sur la carte"
    gps_ok:                 "GPS ±%d m"
    project_grade:          "Projet"
    legend:                 "Ligne pointillée + marqueur ouvert = projet (non réalisé)."

# Prose that goes below the getting-there map on page 1 of the PDF. Multi-line
# YAML with the `|` block operator preserves paragraph breaks. Blank lines
# split paragraphs; word-wrapping is automatic within each paragraph.
getting_there:
  en: |
    From the Refuge du Suffet, the boulders sit in the Vallon d'Ambin about
    15 minutes' walk south-east along the well-marked path. Follow the trail
    towards the Col d'Ambin; the first boulders appear on your right just
    past the second stream crossing.

    Approach shoes are fine. Water at the refuge; nothing on the walk in.
    Best in dry weather — the granite friction drops sharply when damp.
  fr: |
    Depuis le Refuge du Suffet, les blocs se trouvent dans le Vallon d'Ambin,
    à environ 15 minutes de marche au sud-est par le sentier balisé. Prendre
    la direction du Col d'Ambin ; les premiers blocs apparaissent sur la
    droite juste après le second passage de ruisseau.

    Chaussures d'approche suffisantes. Eau au refuge ; rien sur le sentier.
    Préférer le temps sec — l'adhérence du granit chute nettement à l'humidité.
